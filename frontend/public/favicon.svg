<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- ContextBook Owl Face Favicon — matches the login-page logo aesthetic -->
  <rect width="64" height="64" rx="14" fill="#141312"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="24" stroke="#e8b765" stroke-width="2" fill="none"/>
  <!-- Left ear tuft -->
  <polygon points="20,14 16,6 24,12" fill="#e8b765"/>
  <!-- Right ear tuft -->
  <polygon points="44,14 48,6 40,12" fill="#e8b765"/>
  <!-- Face outline -->
  <circle cx="32" cy="33" r="17" fill="none" stroke="#e8b765" stroke-width="2"/>
  <!-- Left eye -->
  <circle cx="25" cy="29" r="5" fill="none" stroke="#e8b765" stroke-width="2"/>
  <circle cx="25" cy="29" r="2" fill="#e8b765"/>
  <!-- Right eye -->
  <circle cx="39" cy="29" r="5" fill="none" stroke="#e8b765" stroke-width="2"/>
  <circle cx="39" cy="29" r="2" fill="#e8b765"/>
  <!-- Beak -->
  <polygon points="32,35 28,42 36,42" fill="#e8b765"/>
  <!-- Chest feathers / detail -->
  <path d="M26 46 Q32 50 38 46" stroke="#e8b765" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M28 50 Q32 53 36 50" stroke="#e8b765" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
